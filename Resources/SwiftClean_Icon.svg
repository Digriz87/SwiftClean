<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3d2fff"></stop>
      <stop offset="60%" stop-color="#5b4fff"></stop>
      <stop offset="100%" stop-color="#7c5cfc"></stop>
    </linearGradient>
    <linearGradient id="bgInner" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6b58ff"></stop>
      <stop offset="100%" stop-color="#4535e8"></stop>
    </linearGradient>
    <linearGradient id="sparkle" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"></stop>
      <stop offset="100%" stop-color="#d4caff"></stop>
    </linearGradient>
    <linearGradient id="arc" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"></stop>
      <stop offset="100%" stop-color="#c4b8ff"></stop>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="white" stop-opacity="0.18"></stop>
      <stop offset="50%" stop-color="white" stop-opacity="0"></stop>
    </linearGradient>
    <filter id="softglow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="16" result="blur"></feGaussianBlur>
      <feMerge><feMergeNode in="blur"></feMergeNode><feMergeNode in="SourceGraphic"></feMergeNode></feMerge>
    </filter>
    <filter id="whiteglow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"></feGaussianBlur>
      <feMerge><feMergeNode in="blur"></feMergeNode><feMergeNode in="SourceGraphic"></feMergeNode></feMerge>
    </filter>
    <clipPath id="clip">
      <rect width="512" height="512" rx="114" ry="114"></rect>
    </clipPath>
  </defs>

  <rect width="512" height="512" rx="114" ry="114" fill="url(#bg)"></rect>
  <rect width="512" height="512" rx="114" ry="114" fill="url(#bgInner)" opacity="0.4"></rect>

  <g clip-path="url(#clip)" opacity="0.07">
    <circle cx="128" cy="128" r="2" fill="white"></circle>
    <circle cx="256" cy="128" r="2" fill="white"></circle>
    <circle cx="384" cy="128" r="2" fill="white"></circle>
    <circle cx="64" cy="256" r="2" fill="white"></circle>
    <circle cx="192" cy="256" r="2" fill="white"></circle>
    <circle cx="320" cy="256" r="2" fill="white"></circle>
    <circle cx="448" cy="256" r="2" fill="white"></circle>
    <circle cx="128" cy="384" r="2" fill="white"></circle>
    <circle cx="256" cy="384" r="2" fill="white"></circle>
    <circle cx="384" cy="384" r="2" fill="white"></circle>
  </g>

  <g filter="url(#whiteglow)">
    <path d="M256,148&#xA;             A108,108 0 1 1 178,310" fill="none" stroke="white" stroke-width="26" stroke-linecap="round"></path>
    <polygon points="160,330 142,296 196,298" fill="white"></polygon>
  </g>

  <g transform="translate(336, 154)" filter="url(#whiteglow)">
    <path d="M0,-22 C0,-6 -6,0 -22,0 C-6,0 0,6 0,22 C0,6 6,0 22,0 C6,0 0,-6 0,-22 Z" fill="white"></path>
    <path d="M0,-13 C0,-4 -4,0 -13,0 C-4,0 0,4 0,13 C0,4 4,0 13,0 C4,0 0,-4 0,-13 Z" fill="white" opacity="0.5" transform="rotate(45)"></path>
  </g>

  <g transform="translate(176, 342)">
    <path d="M0,-13 C0,-4 -4,0 -13,0 C-4,0 0,4 0,13 C0,4 4,0 13,0 C4,0 0,-4 0,-13 Z" fill="white" opacity="0.8"></path>
  </g>

  <circle cx="194" cy="178" r="7" fill="white" opacity="0.55"></circle>
  <circle cx="358" cy="296" r="5" fill="white" opacity="0.4"></circle>

  <rect width="512" height="512" rx="114" ry="114" fill="url(#shine)"></rect>
  <rect width="512" height="512" rx="114" ry="114" fill="none" stroke="white" stroke-width="1.5" stroke-opacity="0.12"></rect>
</svg>
